    <div class="movie-main">
       
        <div id="movie-details-container"></div> 

        <script>
            const movieDetailsContainer = document.getElementById('movie-details-container');
            const TMDB_BASE_URL = 'https://api.themoviedb.org/3';
            const TMDB_IMAGE_BASE = 'https://image.tmdb.org/t/p/w500';

            function getTmdbApiKey() {
                if (!window.TMDB_CONFIG || !window.TMDB_CONFIG.apiKey) {
                    return null;
                }

                if (window.TMDB_CONFIG.apiKey.includes('YOUR_TMDB_API_KEY')) {
                    return null;
                }

                return window.TMDB_CONFIG.apiKey;
            }
    
            async function displayMovieDetails() {
                const tmdbMovieID = localStorage.getItem('tmdbMovieID');
                const tmdbMediaType = localStorage.getItem('tmdbMediaType') || 'movie';
                const tmdbApiKey = getTmdbApiKey();

                if (!tmdbApiKey) {
                    movieDetailsContainer.innerHTML = '<p>TMDb API key is missing in tmdb-config.js.</p>';
                    return;
                }

                if (!tmdbMovieID) {
                    movieDetailsContainer.innerHTML = '<p>No movie selected. Use search or a movie list to open details.</p>';
                    return;
                }

                const res = await fetch(`${TMDB_BASE_URL}/${tmdbMediaType}/${tmdbMovieID}?api_key=${tmdbApiKey}&append_to_response=credits,external_ids`);
                const details = await res.json();

                if (details.success === false) {
                    movieDetailsContainer.innerHTML = `<p>${details.status_message || 'Could not load movie details.'}</p>`;
                    return;
                }

                const displayTitle = details.title || details.name || 'Untitled';
                const primaryDate = details.release_date || details.first_air_date;
                const year = primaryDate ? primaryDate.split('-')[0] : 'N/A';
                const rating = details.vote_average ? `${details.vote_average.toFixed(1)}/10` : 'N/A';
                const released = primaryDate || 'N/A';
                const genres = details.genres && details.genres.length
                    ? details.genres.map((g) => g.name).join(', ')
                    : 'N/A';
                const writerNames = details.credits && details.credits.crew
                    ? details.credits.crew
                        .filter((c) => c.job === 'Writer' || c.job === 'Screenplay' || c.job === 'Story')
                        .slice(0, 3)
                        .map((c) => c.name)
                        .join(', ')
                    : '';
                const actors = details.credits && details.credits.cast
                    ? details.credits.cast.slice(0, 5).map((c) => c.name).join(', ')
                    : '';
                const languages = details.spoken_languages && details.spoken_languages.length
                    ? details.spoken_languages.map((l) => l.english_name || l.name).join(', ')
                    : 'N/A';
                const posterUrl = details.poster_path
                    ? `${TMDB_IMAGE_BASE}${details.poster_path}`
                    : 'https://via.placeholder.com/300x450?text=No+Poster';
                const imdbId = details.external_ids ? details.external_ids.imdb_id : null;
                const embedLink = imdbId
                    ? `https://www.imdb.com/title/${imdbId}`
                    : `https://www.themoviedb.org/${tmdbMediaType}/${details.id}`;
                const watchlistKey = imdbId || `tmdb:${details.id}`;
                const watchlistType = tmdbMediaType;
    
                movieDetailsContainer.innerHTML = `
                    <div class="movie-poster">
                        <img src="${posterUrl}" alt="movie poster">
                    </div>
                    <div class="movie-info">
                        <h3 class="movie-title">${displayTitle}</h3>
                        <ul class="movie-misc-info">
                            <li class="year">Year: ${year}</li>
                            <li class="rated">Ratings: ${rating}</li>
                            <li class="released">Released: ${released}</li>
                        </ul>
                        <p class="genre"><b>Genre:</b> ${genres}</p>
                        <p class="writer"><b>Writer:</b> ${writerNames || 'N/A'}</p>
                        <p class="actors"><b>Actors:</b> ${actors || 'N/A'}</p>
                        <p class="plot"><b>Plot:</b> ${details.overview || 'N/A'}</p>
                        <p class="language"><b>Language:</b> ${languages}</p>
                        <p class="awards"><b><i class="fas fa-award"></i></b> N/A on TMDb</p>
                        <div class="movie-action-row">
                            <a class="movie-action-btn" href="${embedLink}" target="_blank">Play Now</a>
                            <button id="add-watchlist-btn" class="watchlist-action-btn">Add to Watchlist</button>
                            <button id="like-movie-btn" class="watchlist-action-btn" aria-pressed="false">\u2661 Like</button>
                        </div>
                        <p id="watchlist-action-message" class="watchlist-inline-message"></p>
                    </div>
                `;

                const addButton = document.getElementById('add-watchlist-btn');
                const likeButton = document.getElementById('like-movie-btn');
                const actionMessage = document.getElementById('watchlist-action-message');

                if (addButton) {
                    addButton.addEventListener('click', async () => {
                        if (!window.FiscusAuth || !window.FiscusAuth.addMovieToWatchlist) {
                            actionMessage.textContent = 'Supabase is not configured yet.';
                            return;
                        }

                        const result = await window.FiscusAuth.addMovieToWatchlist({
                            imdb_id: watchlistKey,
                            title: displayTitle,
                            year,
                            poster: posterUrl,
                            type: watchlistType
                        });

                        actionMessage.textContent = result.message;
                    });
                }

                if (likeButton) {
                    if (window.FiscusAuth && window.FiscusAuth.isFavoriteMovie && window.FiscusAuth.isFavoriteMovie(watchlistKey)) {
                        likeButton.textContent = '\u2665 Liked';
                        likeButton.setAttribute('aria-pressed', 'true');
                    }

                    likeButton.addEventListener('click', () => {
                        if (!window.FiscusAuth || !window.FiscusAuth.toggleFavoriteMovie) {
                            actionMessage.textContent = 'Profile features are not configured yet.';
                            return;
                        }

                        const result = window.FiscusAuth.toggleFavoriteMovie({
                            imdb_id: watchlistKey,
                            title: displayTitle,
                            year,
                            poster: posterUrl,
                            tmdb_id: details.id
                        });

                        if (result.ok && result.liked) {
                            likeButton.textContent = '\u2665 Liked';
                            likeButton.setAttribute('aria-pressed', 'true');
                        } else if (result.ok) {
                            likeButton.textContent = '\u2661 Like';
                            likeButton.setAttribute('aria-pressed', 'false');
                        }

                        actionMessage.textContent = result.message;
                    });
                }
            }
    
            document.addEventListener('DOMContentLoaded', displayMovieDetails);
        </script>
