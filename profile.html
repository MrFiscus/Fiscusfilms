<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FiscusFilms Profile</title>
  <link rel="stylesheet" href="style.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap');
  </style>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap');
  </style>
  <link rel="icon" type="image/png" href="./image-removebg-preview (1).png">
</head>
<body class="profile-view">
  <div class="body-movie-poster">
    <div class="nav-bar" id="navbar">
      <div class="logo">
        <img class="logo" src="./image-removebg-preview (1).png" alt="FiscusFilms logo">
        <a href="index.html"><h1 class="title">FiscusFilms</h1></a>
      </div>
      <button id="nav-toggle" class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="nav-menu">
        <svg class="nav-toggle-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M3 6.5h18v2H3zm0 4.75h18v2H3zm0 4.75h18v2H3z"></path>
        </svg>
        <span class="sr-only">Menu</span>
      </button>

      <ul class="nav-bar-sub" id="nav-menu">
        <button class="nav-bar-buttons">
          <a class="nav-bar-subbuttons" href="index.html"><span class="nav-bar-text">Home</span></a>
        </button>
        <button class="nav-bar-buttons">
          <a class="nav-bar-subbuttons" href="index.html#popularmovies"><span class="nav-bar-text">Movies</span></a>
        </button>
        <button class="nav-bar-buttons">
          <a class="nav-bar-subbuttons" href="#popularseries"><span class="nav-bar-text">Series</span></a>
        </button>
        <button class="nav-bar-buttons">
          <a class="nav-bar-subbuttons" href="#popularfiscus"><span class="nav-bar-text">List</span></a>
        </button>
        <button class="nav-bar-buttons">
          <a class="nav-bar-subbuttons" href="#watchlist"><span class="nav-bar-text">Watchlist</span></a>
        </button>

        <div class="container">
          <input checked="" class="checkbox" type="checkbox">
          <div class="mainbox">
            <div class="iconContainer">
              <svg viewBox="0 0 512 512" height="1em" xmlns="http://www.w3.org/2000/svg" class="search_icon"><path d="M416 208c0 45.9-14.9 88.3-40 122.7L502.6 457.4c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L330.7 376c-34.4 25.2-76.8 40-122.7 40C93.1 416 0 322.9 0 208S93.1 0 208 0S416 93.1 416 208zM208 352a144 144 0 1 0 0-288 144 144 0 1 0 0 288z"></path></svg>
            </div>
            <input class="form-control search_input" placeholder="Enter Movie Title.." id="movie-search-box" onkeyup="findMovies()" onclick="findMovies()" type="text">
          </div>
          <div class="search-list" id="search-list"></div>
        </div>

        <div class="auth-controls">
          <a id="profile-link" class="profile-link" href="login.html" aria-label="Open profile">
            <img
              class="profile-avatar"
              src="./user.png"
              alt="Profile"
            >
          </a>
        </div>
      </ul>
    </div>

    <main class="profile-page-main">
      <section class="profile-dashboard-shell">
        <div class="profile-image-surface">
          <header class="profile-hero-banner">
            <div class="profile-hero-overlay">
              <div class="profile-hero-main">
                <img id="profile-avatar-preview" class="profile-hero-avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Profile avatar">
                <div class="profile-hero-info">
                  <div class="profile-name-row">
                    <h1 id="profile-name-heading">Guest User</h1>
                    <button id="profile-logout-btn" class="auth-btn auth-btn-secondary profile-logout-btn hidden">Logout</button>
                  </div>
                  <p class="profile-member-line">Member since <span id="profile-member-since">-</span></p>
                  <p id="profile-auth-status" class="profile-auth-status-line">Sign in to view your profile</p>
                </div>
              </div>
              <div class="profile-hero-stats">
                <div class="profile-stat-item">
                  <span id="overview-watchlist-count" class="profile-stat-value">0</span>
                  <span class="profile-stat-label">watchlisted</span>
                </div>
                <div class="profile-stat-item">
                  <span id="overview-favorites-count" class="profile-stat-value">0</span>
                  <span class="profile-stat-label">favorites</span>
                </div>
              </div>
            </div>
          </header>

          <div class="profile-auth-actions">
            <button id="profile-login-btn" class="auth-btn">Sign in</button>
          </div>

          <section class="profile-rails-section">
            <h2>Favorite Movies</h2>
            <div class="profile-rail-slider slider-container">
              <button id="profile-favorites-prev" class="profile-rail-button slider-button" aria-label="Previous favorites">&#10094;</button>
              <div class="profile-rail-viewport movie-recomen-moviesbox">
                <ul id="profile-favorites-list" class="movie-list profile-rail-list"></ul>
              </div>
              <button id="profile-favorites-next" class="profile-rail-button slider-button" aria-label="Next favorites">&#10095;</button>
            </div>
            <p id="profile-favorites-empty" class="profile-rail-empty hidden">No movies yet</p>
          </section>
        </div>

        <section class="profile-rails-section">
          <h2>Watchlisted</h2>
          <div class="profile-rail-slider slider-container">
            <button id="profile-watchlist-prev" class="profile-rail-button slider-button" aria-label="Previous watchlist">&#10094;</button>
            <div class="profile-rail-viewport movie-recomen-moviesbox">
              <ul id="profile-watchlist-list" class="movie-list profile-rail-list"></ul>
            </div>
            <button id="profile-watchlist-next" class="profile-rail-button slider-button" aria-label="Next watchlist">&#10095;</button>
          </div>
          <p id="profile-watchlist-empty" class="profile-rail-empty hidden">No movies yet</p>
        </section>

        <section class="profile-rails-section">
          <h2>History</h2>
          <div class="profile-rail-slider slider-container">
            <button id="profile-history-prev" class="profile-rail-button slider-button" aria-label="Previous history">&#10094;</button>
            <div class="profile-rail-viewport movie-recomen-moviesbox">
              <ul id="profile-history-list" class="movie-list profile-rail-list"></ul>
            </div>
            <button id="profile-history-next" class="profile-rail-button slider-button" aria-label="Next history">&#10095;</button>
          </div>
          <p id="profile-history-empty" class="profile-rail-empty hidden">No movies yet</p>
        </section>

        <section class="profile-editor-section">
          <h2>Edit Profile</h2>
          <form id="profile-form" class="profile-form hidden">
            <div class="profile-field">
              <label for="profile-display-name">Display Name</label>
              <input id="profile-display-name" type="text" placeholder="Your display name">
            </div>

            <div class="profile-field">
              <label for="profile-email">Email</label>
              <input id="profile-email" type="email" placeholder="you@example.com">
            </div>

            <div class="profile-field">
              <label>Change Background Image</label>
              <div class="profile-backdrop-controls">
                <input 
                  id="profile-backdrop-search" 
                  type="text" 
                  placeholder="Search movie..." 
                  class="profile-backdrop-input"
                >
                <button id="profile-change-backdrop-btn" type="button" class="auth-btn">Change Poster</button>
                <button id="profile-pick-random-btn" type="button" class="auth-btn icon-text-btn" title="Pick random poster">
                  <img src="refresh-512.png" alt="Pick Random" class="icon-img">
                  <span>Pick Random</span>
                </button>
                <button id="profile-upload-backdrop-btn" type="button" class="auth-btn icon-text-btn" title="Upload custom background">
                  <img src="upload-512.png" alt="Upload" class="icon-img">
                  <span>Upload</span>
                </button>
                <input id="profile-backdrop-file-input" type="file" accept="image/*" style="display: none;">
              </div>
            </div>

            <div class="profile-save-row">
              <button id="profile-save-btn" type="submit" class="auth-btn">Save Profile</button>
              <span id="profile-save-message" class="profile-save-message"></span>
            </div>
          </form>
        </section>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="tmdb-config.js"></script>
    <script src="supabase-auth-watchlist.js"></script>
    <script src="profile.js"></script>
    <script src="moviepagescript.js"></script>
    <script src="navbar.js"></script>
  </div>
</body>
</html>
